[package]
name = "server"
edition = "2021"
repository = "https://git.average.name/AverageHelper/portfolio"
authors = ["AverageHelper"]
publish = false

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
actix-cors = "0.7.0"
actix-files = "0.6.6"
actix-http = "3.9.0"
actix-service = "2.0.2"
actix-web = { version = "4.9.0", default-features = false, features = ["macros", "compress-brotli", "compress-gzip", "compress-zstd", "http2", "unicode", "compat"] }
futures-core = "0.3.31"
mime-infer = "3.0.0"
rand = "0.8.5"
serde = { version = "1.0.215", features = ["derive"] }
serde_json = { version = "1.0.132", default-features = false }
url = "2.5.4"

[lints.rust]
unsafe_code = "forbid"

[[bin]]
name = "server"
path = "functions/main.rs"
