on:
  push:
    branches: [main]
    paths:
      - .forgejo/workflows/**
      - functions/**
      - public/**
      - src/**
      - astro.config.ts
      - deno.jsonc
      - deno.lock
      - package-lock.json
      - package.json
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.0.3
        with:
          node-version: 20.x

      - name: Setup deno
        uses: https://github.com/denoland/setup-deno@v1 # TODO: Replace this with Rust tooling
        with:
          deno-version: v2.0.3

      - name: Install rustup
        run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y

      - name: Setup Rust toolchain
        run: |
          . "$HOME/.cargo/env"
          rustup update ${{ matrix.toolchain }} && rustup default ${{ matrix.toolchain }}
          rustup component add clippy
          cargo install --locked cargo-deny

      - name: Install Node dependencies
        run: |
          deno install --frozen
          npm ci

      - name: Build
        run: deno task build

      - name: Check dependencies
        run: |
          . "$HOME/.cargo/env"
          cargo deny check

      - name: Clippy
        run: |
          . "$HOME/.cargo/env"
          cargo clippy
          cargo clippy --tests

      - name: Test
        run: |
          . "$HOME/.cargo/env"
          cargo test --verbose --locked
